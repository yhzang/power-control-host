# 示例配置：用于后续补回 PSW 或扩展到多设备时参考。
app:
  name: Reliability Power Host
  environment: dev
  log_dir: logs
  export_dir: exports
  runtime_dir: runtime

devices:
  - id: odp_01
    vendor: owon
    model: ODP3012
    transport:
      type: socket
      host: 192.168.1.101
      port: 4196
      timeout_ms: 3000
      write_termination: "\n"
      read_termination: "\n"
    logical_channels:
      - CH1
    notes: >
      ODP 当前优先按 socket 方式示例。最终以现场实测 IP、端口和返回格式为准。
  - id: psw_01
    vendor: gwinstek
    model: PSW30-72
    transport:
      type: visa
      resource: TCPIP0::192.168.1.102::INSTR
      timeout_ms: 3000
      write_termination: "\n"
      read_termination: "\n"
    logical_channels:
      - OUT
    notes: >
      PSW 资源地址先按常见 VISA/TCPIP 形式示例，后续以现场设备接口和识别结果为准。
