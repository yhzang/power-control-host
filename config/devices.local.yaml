# 第一次 USB 通信验证时，不需要先把这份配置写完整。
# 建议顺序：
# 1. 先执行 `python -m power_control_host list-visa-resources`
# 2. 再执行 `python -m power_control_host probe-visa --resource "..."`
# 3. 等 `*IDN?` 成功后，再把成功的资源字符串粘贴到下面的 resource 字段

app:
  name: Reliability Power Host
  environment: local
  log_dir: logs
  export_dir: exports
  runtime_dir: runtime

devices:
  - id: odp_01
    vendor: OWON
    model: ODP3012
    transport:
      type: socket
      host: 192.168.1.1
      port: 4196
      timeout_ms: 3000
      write_termination: "\n"
      read_termination: "\n"
    logical_channels:
      - CH1

  - id: psw_01
    vendor: gwinstek
    model: PSW30-72
    transport:
      type: visa
      resource: TCPIP0::192.168.1.102::INSTR
      timeout_ms: 3000
      write_termination: "\n"
      read_termination: "\n"
    logical_channels:
      - OUT
    notes: >
      PSW 默认按单输出处理。若现在先用 USB 验证，
      请把 resource 整行替换成 list-visa-resources 列出来并且 probe-visa 成功的完整资源字符串。
      若现场设备使用 Socket 或 Serial，请把 transport 节点改成对应配置。
