# 当前本地配置先只保留 1 台 ODP，降低联调复杂度。
# 先把这台 ODP 的 socket 命令链跑清楚，再逐步补回 PSW 和多设备。
app:
  name: Reliability Power Host
  environment: local
  log_dir: logs
  export_dir: exports
  runtime_dir: runtime

devices:
  - id: odp_01
    vendor: owon
    model: ODP3012
    transport:
      type: socket
      host: 192.168.1.1
      port: 4196
      timeout_ms: 3000
      write_termination: "\n"
      read_termination: "\n"
    logical_channels:
      - CH1
      - CH2
    notes: >
      当前先只联调 1 台 ODP。若 socket 命令稳定后，再把第二台 ODP
      或 PSW 逐步加回配置。
